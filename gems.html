<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Free AI Opportunities — AIGems</title>
<meta name="description" content="Browse all free AI opportunities on AIGems — credits, beta access, courses, scholarships, tools and more. Updated automatically every 4 hours.">
<meta property="og:title" content="All Free AI Gems — AIGems">
<meta property="og:description" content="Browse 57+ free AI opportunities including credits, beta access, courses and tools.">
<meta property="og:url" content="https://aigems-web.vercel.app/gems">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2ee;color:#111410;padding:32px 24px;max-width:960px;margin:0 auto}
header{margin-bottom:40px}
header a{text-decoration:none;color:#111410;font-weight:700;font-size:20px}
header p{color:#4a5246;font-size:15px;margin-top:8px}
h1{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.gem{background:#fff;border:1px solid #e4e8e1;border-radius:12px;padding:20px;margin-bottom:12px}
.gem-title{font-size:16px;font-weight:700;color:#111410;margin-bottom:6px}
.gem-title a{color:#3a7432;text-decoration:none}
.gem-title a:hover{text-decoration:underline}
.gem-desc{font-size:14px;color:#4a5246;line-height:1.6;margin-bottom:10px}
.gem-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#9aa394}
.gem-cat{background:#eef5ec;color:#3a7432;border-radius:100px;padding:2px 10px;font-weight:600;font-size:11px}
footer{margin-top:48px;padding-top:24px;border-top:1px solid #e4e8e1;font-size:13px;color:#9aa394}
footer a{color:#3a7432;text-decoration:none}
</style>
</head>
<body>
<header>
  <a href="/">← AIGems</a>
  <h1>All Free AI Opportunities</h1>
  <p>Browse every gem in the AIGems radar. Updated automatically every 4 hours. <a href="/">Get your personalised feed →</a></p>
</header>

<main id="gems-list">
  <p style="color:#9aa394">Loading gems...</p>
</main>

<footer>
  <p>AIGems — Free radar for AI credits, beta access, courses and tools. <a href="/">Visit AIGems →</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient(
  'https://jnxknsuhxbbtawvjacml.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpueGtuc3VoeGJidGF3dmphY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDI1OTMsImV4cCI6MjA4ODkxODU5M30.hn5xAjaHgm2qr18rbYP52zyrEnSdYpKsAF1Oiz47eng'
);
async function load(){
  const{data}=await sb.from('opportunities').select('*').eq('status','active').order('created_at',{ascending:false});
  const list=document.getElementById('gems-list');
  if(!data?.length){list.innerHTML='<p>No gems found.</p>';return;}
  list.innerHTML=data.map(o=>`
    <div class="gem" itemscope itemtype="https://schema.org/Offer">
      <div class="gem-title">
        <a href="${o.source_url}" rel="noopener" itemprop="url">${o.title}</a>
        <span class="gem-cat">${o.category}</span>
      </div>
      <p class="gem-desc" itemprop="description">${o.description||''}</p>
      <div class="gem-meta">
        <span>Source: ${o.source_name}</span>
        ${o.expiry_date?`<span>Expires: ${new Date(o.expiry_date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span>`:''}
        ${o.gem_value_usd?`<span>Value: ~$${o.gem_value_usd}</span>`:''}
        <span>Added: ${new Date(o.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span>
      </div>
    </div>`).join('');
}
load();
</script>
</body>
</html>
